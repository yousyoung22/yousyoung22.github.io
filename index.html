<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서예진 소개</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Pretendard", sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
    padding:30px;
}

.card{
    width:800px;
    max-width:100%;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(10px);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-8px);
}

.header{
    background:linear-gradient(135deg,#ff6b81,#ff8fab);
    color:white;
    text-align:center;
    padding:50px 20px;
}

.profile-circle{
    width:120px;
    height:120px;
    border-radius:50%;
    background:white;
    color:#ff6b81;
    margin:0 auto 20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    font-weight:bold;
    border:5px solid rgba(255,255,255,0.5);
}

.header h1{
    font-size:2.5rem;
}

.header p{
    margin-top:10px;
    opacity:0.9;
}

.content{
    padding:40px;
}

.section{
    margin-bottom:25px;
}

.section h2{
    color:#ff6b81;
    margin-bottom:10px;
    font-size:1.3rem;
}

.section p{
    color:#555;
    line-height:1.8;
}

.tags{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:15px;
}

.tag{
    background:#ffe3ea;
    color:#ff4f7b;
    padding:8px 15px;
    border-radius:30px;
    font-size:0.9rem;
    font-weight:bold;
}

.footer{
    text-align:center;
    padding:20px;
    background:#fff5f7;
    color:#ff6b81;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

    <div class="header">
        <div class="profile-circle">YJ</div>
        <h1>서예진</h1>
        <p>매력과 건강미를 모두 갖춘 사람</p>
    </div>

    <div class="content">

        <div class="section">
            <h2>✨ 외모</h2>
            <p>
                동글동글하고 사랑스러운 얼굴형이 인상적이며,
                진한 눈썹과 풍성한 속눈썹이 또렷한 눈매를 만들어 줍니다.
                밝고 부드러운 분위기 덕분에 보는 사람에게 좋은 인상을 남깁니다.
            </p>
        </div>

        <div class="section">
            <h2>💖 특징</h2>
            <p>
                165cm의 균형 잡힌 체형과 길게 뻗은 다리를 가지고 있으며,
                탄탄하게 발달한 근육 덕분에 건강하고 활기찬 매력을 보여줍니다.
            </p>
        </div>

        <div class="section">
            <h2>🌸 매력 포인트</h2>
            <div class="tags">
                <div class="tag">동글동글한 얼굴</div>
                <div class="tag">진한 눈썹</div>
                <div class="tag">풍성한 속눈썹</div>
                <div class="tag">긴 다리</div>
                <div class="tag">탄탄한 근육</div>
                <div class="tag">건강미</div>
                <div class="tag">사랑스러운 매력</div>
            </div>
        </div>

    </div>

    <div class="footer">
        ❤️ 서예진 소개 페이지 ❤️
    </div>

</div>

</body>
</html>
